global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance: "local-vm"

  - job_name: "flask_app"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:5000"]
        labels:
          instance: "flask-app"
